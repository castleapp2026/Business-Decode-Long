name: Auto Render Hindi Facts Video

on:
  repository_dispatch:
    types: [render_and_upload]

# 👇 YEH BLOCK ADD KIYA GAYA HAI (Releases create karne ki permission) 👇
permissions:
  contents: write

jobs:
  build_video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install System Dependencies (FFmpeg & ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 requests edge-tts urllib3 Pillow==9.5.0

      - name: Run Video Rendering Script
        env:
          FULL_TEXT: ${{ github.event.client_payload.full_text }}
          SCENES_DATA: ${{ github.event.client_payload.scenes_data }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          TITLE: ${{ github.event.client_payload.title }}
          DESCRIPTION: ${{ github.event.client_payload.description }}
          THUMBNAIL_PROMPT: ${{ github.event.client_payload.thumbnail_prompt }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }} 
          # 👇 YEH LINE ADD KI GAYI HAI 👇
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -u render_video.py  

      # 👇 NAYA AUTO-DELETE BLOCK YAHAN HAI 👇
      - name: Auto-delete older releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
